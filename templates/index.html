<!DOCTYPE html>
<html>
<head>
    <title>Malaria Detection AI</title>
        <style>
                body {
                            font-family: Arial;
                                        text-align: center;
                                                    margin-top: 50px;
                                                                background: #f4f4f4;
                                                                        }
                                                                                .box {
                                                                                            background: white;
                                                                                                        padding: 20px;
                                                                                                                    width: 400px;
                                                                                                                                margin: auto;
                                                                                                                                            border-radius: 10px;
                                                                                                                                                        box-shadow: 0px 0px 10px gray;
                                                                                                                                                                }
                                                                                                                                                                    </style>
                                                                                                                                                                    </head>

                                                                                                                                                                    <body>
                                                                                                                                                                        <div class="box">
                                                                                                                                                                                <h2>🦠 Malaria Detection AI</h2>

                                                                                                                                                                                        <form action="/predict" method="post" enctype="multipart/form-data">
                                                                                                                                                                                                    <input type="file" name="image" required>
                                                                                                                                                                                                                <br><br>
                                                                                                                                                                                                                            <button type="submit">Predict</button>
                                                                                                                                                                                                                                    </form>

                                                                                                                                                                                                                                            {% if prediction %}
                                                                                                                                                                                                                                                        <h3>Result: {{ prediction }}</h3>
                                                                                                                                                                                                                                                                {% endif %}
                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                    </body>
                                                                                                                                                                                                                                                                    </html>
